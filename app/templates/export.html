{% extends "base.html" %}
{% block content %}

<h2 data-i18n="export_data">Export Data</h2>

<div class="export-form">
    <div class="form-grid">
        <div class="form-group">
            <label data-i18n="date_from">From:</label>
            <input type="date" id="exportFrom">
        </div>
        <div class="form-group">
            <label data-i18n="date_to">To:</label>
            <input type="date" id="exportTo">
        </div>
    </div>
    <div class="form-actions">
        <button onclick="exportData('excel')" class="btn btn-primary" data-i18n="export_excel">Export Excel</button>
        <button onclick="exportData('csv')" class="btn" data-i18n="export_csv">Export CSV</button>
    </div>

    <div id="exportResult" style="display:none" class="export-result">
        <p data-i18n="export_ready">Export ready:</p>
        <a id="exportLink" href="#" class="btn btn-primary" data-i18n="download">Download</a>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/export.js"></script>
{% endblock %}
