{% extends "base.html" %}
{% block content %}

<h2 data-i18n="settings">Settings</h2>

<div class="config-section">
    <h3 data-i18n="site_config">Site Configuration</h3>
    <form id="siteForm" onsubmit="saveSite(event)">
        <div class="form-grid">
            <div class="form-group">
                <label data-i18n="site_name">Site Name</label>
                <input type="text" id="siteName" name="site_name">
            </div>
            <div class="form-group">
                <label data-i18n="site_code">Site Code</label>
                <input type="text" id="siteCode" name="site_code" maxlength="5">
            </div>
            <div class="form-group">
                <label data-i18n="language">Language</label>
                <select id="siteLang" name="default_language">
                    <option value="en">English</option>
                    <option value="fr">Francais</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="save">Save</button>
    </form>
</div>

<div class="config-section">
    <h3 data-i18n="test_menu">Test Menu</h3>
    <table class="config-table" id="testTable">
        <thead>
            <tr>
                <th data-i18n="order">Order</th>
                <th data-i18n="code">Code</th>
                <th>Name (EN)</th>
                <th>Name (FR)</th>
                <th data-i18n="category">Category</th>
                <th data-i18n="type">Type</th>
                <th data-i18n="active">Active</th>
            </tr>
        </thead>
        <tbody id="testTableBody"></tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Load site config
    fetch('/api/config/site').then(r => r.json()).then(site => {
        document.getElementById('siteName').value = site.site_name || '';
        document.getElementById('siteCode').value = site.site_code || '';
        document.getElementById('siteLang').value = site.default_language || 'en';
    });

    // Load tests
    fetch('/api/config/tests').then(r => r.json()).then(tests => {
        const tbody = document.getElementById('testTableBody');
        tbody.innerHTML = '';
        tests.forEach(t => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${t.display_order}</td>
                <td><code>${t.code}</code></td>
                <td>${t.name_en}</td>
                <td>${t.name_fr}</td>
                <td>${t.category}</td>
                <td>${t.result_type}</td>
                <td>
                    <button onclick="toggleTest(${t.id})" class="btn btn-sm ${t.is_active ? 'btn-active' : 'btn-inactive'}">
                        ${t.is_active ? 'ON' : 'OFF'}
                    </button>
                </td>`;
            tbody.appendChild(tr);
        });
    });
});

function saveSite(e) {
    e.preventDefault();
    const data = {
        site_name: document.getElementById('siteName').value,
        site_code: document.getElementById('siteCode').value,
        default_language: document.getElementById('siteLang').value
    };
    fetch('/api/config/site', {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)})
        .then(r => r.json()).then(() => { alert('Saved'); location.reload(); });
}

function toggleTest(id) {
    fetch(`/api/config/tests/${id}/toggle`, {method: 'PUT'})
        .then(r => r.json()).then(() => location.reload());
}
</script>
{% endblock %}
