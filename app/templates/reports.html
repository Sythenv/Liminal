{% extends "base.html" %}
{% block content %}

<h2>Monthly Report</h2>

<div class="export-form">
    <div class="form-grid">
        <div class="form-group">
            <label>Month</label>
            <select id="reportMonth">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" id="reportYear" min="2020" max="2099">
        </div>
    </div>
    <div class="form-actions">
        <button onclick="generateReport()" class="btn btn-primary">Generate PDF Report</button>
    </div>

    <div id="reportResult" style="display:none" class="export-result">
        <p id="reportSummary"></p>
        <a id="reportLink" href="#" class="btn btn-primary">Download PDF</a>
    </div>

    <div id="reportError" style="display:none" class="export-error">
        <p id="reportErrorText"></p>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/reports.js"></script>
{% endblock %}
