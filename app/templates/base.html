<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site_name }} - Lab Register</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="app-header" id="appHeader" {% block header_style %}{% endblock %}>
    <div class="app-brand">
        <img src="/static/img/logo.svg" alt="Logo" class="app-logo-img" id="appLogoImg">
        <span class="app-logo" id="appLogoText" style="display:none">LAB</span>
        <span class="app-title">{{ site_name }}</span>
        <span class="app-operator" id="headerOperator"></span>
    </div>
    <div class="header-right">
        <button class="wl-toggle" id="wlToggleHeader" style="display:none" data-i18n="wl_show_all">Show all</button>
        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fr">FR</button>
            <button class="lang-btn" data-lang="ar">عر</button>
        </div>
    </div>
</header>

<nav class="app-nav" id="appNav" {% block nav_style %}{% endblock %}>
    <a href="/register" class="nav-link" data-i18n="nav_worklist"><span class="nav-icon">&#128300;</span><span class="nav-label">Worklist</span></a>
    <a href="/equipment" class="nav-link" data-i18n="nav_equipment"><span class="nav-icon">&#9881;</span><span class="nav-label">Equipment</span></a>
    <a href="/reports" class="nav-link" data-i18n="nav_reports"><span class="nav-icon">&#128202;</span><span class="nav-label">Reports</span></a>
    <a href="/patients" class="nav-link nav-locked" data-unlock="1" data-i18n="nav_patients"><span class="nav-icon">&#128101;</span><span class="nav-label">Patients</span></a>
    <a href="/bloodbank" class="nav-link nav-locked" data-unlock="2" data-i18n="nav_bloodbank"><span class="nav-icon">&#129656;</span><span class="nav-label">Blood Bank</span></a>
    <a href="/settings" class="nav-link nav-locked" data-unlock="3" data-i18n="nav_settings"><span class="nav-icon">&#9881;</span><span class="nav-label">Settings</span></a>
</nav>

<main class="content">
    {% block content %}{% endblock %}
</main>

<!-- PIN NUMPAD OVERLAY -->
<div id="pinOverlay" class="pin-overlay" style="display:none" data-pin="">
    <img src="/static/img/logo.svg" alt="" class="pin-logo" id="pinLogo">
    <div class="pin-container" id="pinPad">
        <div class="pin-message" id="pinMessage" data-i18n="pin_enter">Enter your PIN</div>
        <div class="pin-dots" id="pinDots"></div>
        <div class="pin-error" id="pinError" style="display:none"></div>
        <div class="pin-grid">
            <button class="pin-key" data-key="1">1</button>
            <button class="pin-key" data-key="2">2</button>
            <button class="pin-key" data-key="3">3</button>
            <button class="pin-key" data-key="4">4</button>
            <button class="pin-key" data-key="5">5</button>
            <button class="pin-key" data-key="6">6</button>
            <button class="pin-key" data-key="7">7</button>
            <button class="pin-key" data-key="8">8</button>
            <button class="pin-key" data-key="9">9</button>
            <button class="pin-key pin-key-back" data-key="back">&#9003;</button>
            <button class="pin-key" data-key="0">0</button>
            <button class="pin-key pin-key-ok" data-key="ok">&#10003;</button>
        </div>
        <div class="pin-demo-hint">Demo PINs: 0777 (admin) · 0755 (supervisor) · 0644 (operator)</div>
    </div>
    <div class="ob-screen" id="onboardingWizard" style="display:none"></div>
</div>

<footer class="app-footer"><span class="version">{{ config.VERSION }}</span></footer>

<script src="/static/js/components.js"></script>
<script src="/static/js/pin.js"></script>
<script src="/static/js/i18n.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
